name: Parallel Job WorkFlow
on: [workflow_dispatch]

jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - run: echo "ジョブ１を実行中…"
            - run: sleep 15
    
    job2:
        runs-on: ubuntu-latest
        steps:
            - run: echo "ジョブ１を実行中..."
            - run: sleep 15