name: Checkout Check Workflow   # チェックアウト確認用のワークフロー
on: [workflow_dispatch]

jobs:
    without-checkout:
        runs-on: ubuntu-latest
        steps: 
            - name: ディレクトリの確認（checkoutなし）
              run: |
                echo "=== checkoutしていない状態のファイル一覧 ==="
                ls -la
    with-checkout:
        runs-on: ubuntu-latest
        steps:
            - name: repositoryのチェックアウト
              uses: actions/checkout@v4
            - name: ディレクトリの確認（checkoutあり）
              run: |
                echo "=== Checkoutした状態のファイル一覧 ==="
                ls -la